# Runtime dir for the per-uid Unix sockets of the mrcall-desktop WS engines
# (zylch-server@<uid> -> /run/mrcalld/<uid>.sock). It lives on tmpfs (/run), so
# it must be recreated at every boot — that is what this tmpfiles.d entry does.
#
# Owner `mrcalld` (the service user that runs the daemons); group `caddy` (the
# reverse-proxy that connects to the sockets); mode 2750 = setgid, so every
# socket created in here inherits group `caddy` regardless of the daemon's own
# group, while only mrcalld + caddy can traverse the dir.
#
# NOTE: `caddy` is Caddy's group on the production VPS (confirmed 2026-06-05).
# If you deploy elsewhere, confirm the reverse-proxy's group and adjust it here.
#
# Install:  sudo cp engine/scripts/tmpfiles.d/mrcalld.conf /etc/tmpfiles.d/
#           sudo systemd-tmpfiles --create /etc/tmpfiles.d/mrcalld.conf
d /run/mrcalld 2750 mrcalld caddy -
