# Zylch GitLab CI/CD Pipeline
# ===========================
# Builds ARM64 Docker image natively on self-hosted ARM runner (Scaleway)
# and deploys to Scaleway Kubernetes (ARM nodes).
#
# Branches:
#   dev        -> builds + deploys to starchat-test namespace
#   production -> builds + deploys to starchat-production namespace
#
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   CI_REGISTRY, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD  (auto-set by GitLab)
#   KUBECONFIG_TEST        - base64-encoded kubeconfig for test cluster
#   KUBECONFIG_PRODUCTION  - base64-encoded kubeconfig for production cluster
#
# Runner: self-hosted ARM64 on Scaleway (tag: arm64), shell executor

stages:
  - build
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE

# ============================================================
# BUILD: ARM64 Docker image (native on self-hosted ARM runner)
# ============================================================
build:
  stage: build
  timeout: 2h
  tags:
    - arm64
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      if [ "$CI_COMMIT_REF_NAME" = "production" ]; then
        TAG="prod-${CI_COMMIT_SHORT_SHA}"
      else
        TAG="dev-${CI_COMMIT_SHORT_SHA}"
      fi
      echo "Building $IMAGE_NAME:$TAG natively on ARM64"
      docker build \
        --tag "$IMAGE_NAME:$TAG" \
        --tag "$IMAGE_NAME:$CI_COMMIT_REF_NAME" \
        .
      docker push "$IMAGE_NAME:$TAG"
      docker push "$IMAGE_NAME:$CI_COMMIT_REF_NAME"
      echo "TAG=$TAG" > build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "production"

# ============================================================
# DEPLOY: Test (from dev branch)
# ============================================================
# Test uses in-cluster postgres (not Managed PostgreSQL).
# Manifests are in the repo under k8s/test/.
deploy-test:
  stage: deploy
  tags:
    - arm64
  needs:
    - build
  script:
    - echo "$KUBECONFIG_TEST" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - NAMESPACE="starchat-test"
    - echo "Deploying $IMAGE_NAME:$TAG to $NAMESPACE"
    # Apply postgres manifests (idempotent)
    - kubectl apply -f k8s/test/configmap-postgres-init.yaml
    - kubectl apply -f k8s/test/deployment-postgres.yaml
    - kubectl apply -f k8s/test/service-postgres.yaml
    # Deploy zylch with new image
    - kubectl set image deployment/zylch zylch="$IMAGE_NAME:$TAG" -n "$NAMESPACE"
    - kubectl rollout status deployment/postgres -n "$NAMESPACE" --timeout=120s
    - kubectl rollout status deployment/zylch -n "$NAMESPACE" --timeout=300s
    - kubectl get pods -n "$NAMESPACE"
  after_script:
    - rm -f /tmp/kubeconfig
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

# ============================================================
# DEPLOY: Production (from production branch)
# ============================================================
deploy-production:
  stage: deploy
  tags:
    - arm64
  needs:
    - build
  script:
    - echo "$KUBECONFIG_PRODUCTION" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - NAMESPACE="starchat-production"
    - echo "Deploying $IMAGE_NAME:$TAG to $NAMESPACE"
    - kubectl set image deployment/zylch zylch="$IMAGE_NAME:$TAG" -n "$NAMESPACE"
    - kubectl rollout status deployment/zylch -n "$NAMESPACE" --timeout=300s
    - kubectl get pods -n "$NAMESPACE" -l app=zylch
  after_script:
    - rm -f /tmp/kubeconfig
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
