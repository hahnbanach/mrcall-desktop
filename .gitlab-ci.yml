# Zylch GitLab CI/CD Pipeline
# ===========================
# Builds ARM64 Docker image via QEMU emulation on amd64 runner
# and deploys to Scaleway Kubernetes (ARM nodes).
#
# Branches:
#   dev        -> builds + deploys to starchat-test namespace
#   production -> builds + deploys to starchat-production namespace
#
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   CI_REGISTRY, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD  (auto-set by GitLab)
#   KUBECONFIG_TEST        - base64-encoded kubeconfig for test cluster
#   KUBECONFIG_PRODUCTION  - base64-encoded kubeconfig for production cluster
#

stages:
  - build
  - deploy

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  DOCKER_TLS_CERTDIR: "/certs"

# ============================================================
# BUILD: ARM64 Docker image (QEMU on amd64 runner)
# ============================================================
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Register QEMU for ARM64 emulation
    - docker run --rm --privileged tonistiigi/binfmt --install arm64
    # Create buildx builder using docker-container driver
    # The DOCKER_TLS_CERTDIR certs are passed via env to the builder
    - docker buildx create --use --name armbuilder
      --driver docker-container
      --driver-opt "network=host"
    - docker buildx inspect armbuilder --bootstrap
  script:
    - |
      if [ "$CI_COMMIT_REF_NAME" = "production" ]; then
        TAG="prod-${CI_COMMIT_SHORT_SHA}"
      else
        TAG="dev-${CI_COMMIT_SHORT_SHA}"
      fi
      echo "Building $IMAGE_NAME:$TAG for linux/arm64 (QEMU)"
      docker buildx build \
        --platform linux/arm64 \
        --tag "$IMAGE_NAME:$TAG" \
        --tag "$IMAGE_NAME:$CI_COMMIT_REF_NAME" \
        --push \
        .
      echo "TAG=$TAG" > build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "production"

# ============================================================
# DEPLOY: Test (from dev branch)
# ============================================================
deploy-test:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  needs:
    - build
  script:
    - echo "$KUBECONFIG_TEST" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - NAMESPACE="starchat-test"
    - echo "Deploying $IMAGE_NAME:$TAG to $NAMESPACE"
    - kubectl set image deployment/zylch zylch="$IMAGE_NAME:$TAG" -n "$NAMESPACE"
    - kubectl rollout status deployment/zylch -n "$NAMESPACE" --timeout=300s
    - kubectl get pods -n "$NAMESPACE" -l app=zylch
  after_script:
    - rm -f /tmp/kubeconfig
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

# ============================================================
# DEPLOY: Production (from production branch)
# ============================================================
deploy-production:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  needs:
    - build
  script:
    - echo "$KUBECONFIG_PRODUCTION" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - NAMESPACE="starchat-production"
    - echo "Deploying $IMAGE_NAME:$TAG to $NAMESPACE"
    - kubectl set image deployment/zylch zylch="$IMAGE_NAME:$TAG" -n "$NAMESPACE"
    - kubectl rollout status deployment/zylch -n "$NAMESPACE" --timeout=300s
    - kubectl get pods -n "$NAMESPACE" -l app=zylch
  after_script:
    - rm -f /tmp/kubeconfig
  rules:
    - if: $CI_COMMIT_BRANCH == "production"
