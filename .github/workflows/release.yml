name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""
          - os: macos-13
            platform: macos
            arch: x64
            ext: ""
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: ""
          - os: windows-latest
            platform: windows
            arch: x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name zylch-${{ matrix.platform }}-${{ matrix.arch }} --hidden-import zylch.cli.main --collect-all zylch --collect-all fastembed --collect-all neonize --collect-binaries neonize --collect-all onnxruntime --collect-binaries onnxruntime zylch/cli/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zylch-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/zylch-${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zylch-linux-x64/zylch-linux-x64
            zylch-macos-x64/zylch-macos-x64
            zylch-macos-arm64/zylch-macos-arm64
            zylch-windows-x64/zylch-windows-x64.exe
