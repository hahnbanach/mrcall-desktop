# PostgreSQL Init Scripts - Test
# ==============================
# Enables required extensions on first DB init.
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: starchat-test
  labels:
    app: postgres
    environment: test
data:
  init-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "vector";
