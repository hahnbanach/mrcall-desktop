version: '3.8'

services:
  zylch-api:
    build: .
    container_name: zylch-api
    ports:
      - "8000:8000"
    environment:
      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Firebase (server-side validation)
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/credentials/firebase-service-account.json
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}

      # StarChat
      - STARCHAT_API_URL=${STARCHAT_API_URL}
      - STARCHAT_API_KEY=${STARCHAT_API_KEY}
      - STARCHAT_USERNAME=${STARCHAT_USERNAME}
      - STARCHAT_PASSWORD=${STARCHAT_PASSWORD}
      - STARCHAT_BUSINESS_ID=${STARCHAT_BUSINESS_ID}

      # SendGrid
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}

      # Vonage SMS
      - VONAGE_API_KEY=${VONAGE_API_KEY}
      - VONAGE_API_SECRET=${VONAGE_API_SECRET}
      - VONAGE_FROM_NUMBER=${VONAGE_FROM_NUMBER}

      # Google OAuth
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/google_oauth.json
      - GOOGLE_TOKEN_PATH=/app/credentials/google_tokens/

      # CORS (for dashboard integration)
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:3000}

      # Webhook
      - WEBHOOK_PUBLIC_URL=${WEBHOOK_PUBLIC_URL}

    volumes:
      # Mount credentials (read-only)
      - ./credentials:/app/credentials:ro

      # Persistent data
      - zylch-cache:/app/cache
      - zylch-data:/app/.swarm

    restart: unless-stopped
    networks:
      - zylch-network

    # Resource limits (optional, uncomment to enable)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G

  # Optional: Redis for future scaling (pub/sub, caching)
  # redis:
  #   image: redis:7-alpine
  #   container_name: zylch-redis
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - zylch-network
  #   restart: unless-stopped

volumes:
  zylch-cache:
    driver: local
  zylch-data:
    driver: local
  # redis-data:
  #   driver: local

networks:
  zylch-network:
    driver: bridge
