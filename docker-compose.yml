services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zylch-postgres
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: zylch
      POSTGRES_USER: zylch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zylch-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zylch -d zylch"]
      interval: 10s
      timeout: 5s
      retries: 5

  zylch-api:
    build: .
    container_name: zylch-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env.shared
      - .env.${ZYLCH_MODE:-mrcall}
    # DATABASE_URL comes from the mode-specific env file:
    # .env.mrcall → not set (uses default below)
    # .env.standalone → Railway remote DB

    volumes:
      # Mount credentials (read-only)
      - ./credentials:/app/credentials:ro

      # Persistent data
      - zylch-cache:/app/cache
      - zylch-data:/app/.swarm

    restart: unless-stopped
    networks:
      - zylch-network

    # Resource limits (optional, uncomment to enable)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G

  # Optional: Redis for future scaling (pub/sub, caching)
  # redis:
  #   image: redis:7-alpine
  #   container_name: zylch-redis
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - zylch-network
  #   restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  zylch-cache:
    driver: local
  zylch-data:
    driver: local
  # redis-data:
  #   driver: local

networks:
  zylch-network:
    driver: bridge
